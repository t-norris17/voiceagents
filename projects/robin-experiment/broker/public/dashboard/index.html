<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Robin — Experiment Monitor</title>
<style>
  :root {
    --paper:#f2f0ea; --ink:#17181c; --sub:#6c7075; --faint:#a29e95;
    --line:#d7d3c9; --hair:#e4e1d8;
    --accent:#b8501e;
    --sans:"Helvetica Neue",Helvetica,Arial,system-ui,sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{ --paper:#15161a; --ink:#ecebe6; --sub:#9a9ea4; --faint:#6a6e74;
      --line:#2b2d33; --hair:#212329; --accent:#e08a4a; }
  }
  :root[data-theme="light"]{ --paper:#f2f0ea; --ink:#17181c; --sub:#6c7075; --faint:#a29e95; --line:#d7d3c9; --hair:#e4e1d8; --accent:#b8501e; }
  :root[data-theme="dark"]{ --paper:#15161a; --ink:#ecebe6; --sub:#9a9ea4; --faint:#6a6e74; --line:#2b2d33; --hair:#212329; --accent:#e08a4a; }

  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--paper); color:var(--ink); font-family:var(--sans);
    line-height:1.5; -webkit-font-smoothing:antialiased; }
  .sheet{ max-width:820px; margin:0 auto; padding:clamp(28px,6vw,64px) clamp(20px,5vw,44px) 60px; }
  .tnum{ font-variant-numeric:tabular-nums; }
  .lbl{ font-size:.66rem; text-transform:uppercase; letter-spacing:.2em; color:var(--sub); font-weight:600; }
  .accent{ color:var(--accent); }

  .mast{ display:flex; align-items:baseline; justify-content:space-between; gap:16px; padding-bottom:14px; border-bottom:2px solid var(--ink); }
  .mast .wm{ font-size:1.4rem; font-weight:800; letter-spacing:.02em; text-transform:uppercase; margin:0; }
  .mast .meta{ font-size:.72rem; color:var(--sub); text-align:right; line-height:1.7; letter-spacing:.02em; }
  .mast .meta b{ color:var(--ink); font-weight:600; }
  .themebtn{ font:inherit; font-size:.66rem; letter-spacing:.1em; text-transform:uppercase; background:none; border:0; color:var(--sub); cursor:pointer; padding:0; margin-left:10px; }
  .themebtn:hover{ color:var(--ink); }

  .verdict{ display:grid; grid-template-columns:repeat(3,1fr); margin-top:38px; }
  .v{ padding:2px 24px; border-left:1px solid var(--line); }
  .v:first-child{ padding-left:0; border-left:0; }
  .v .k{ margin-bottom:14px; }
  .v .fig{ font-size:clamp(2.6rem,7vw,3.5rem); font-weight:800; line-height:.9; letter-spacing:-.03em; }
  .v .fig .un{ font-size:1rem; font-weight:600; color:var(--sub); letter-spacing:0; margin-left:4px; }
  .v .note{ font-size:.8rem; color:var(--sub); margin-top:12px; line-height:1.45; }
  .v .note b{ color:var(--ink); font-weight:600; }

  hr.rule{ border:0; border-top:1px solid var(--line); margin:44px 0 0; }

  section{ margin-top:40px; }
  .shead{ display:flex; align-items:baseline; justify-content:space-between; gap:16px; margin-bottom:2px; }
  .tabset{ display:flex; gap:18px; }
  .tabset button{ font:inherit; font-size:.66rem; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); background:none; border:0; padding:0 0 4px; cursor:pointer; border-bottom:2px solid transparent; }
  .tabset button[aria-pressed="true"]{ color:var(--ink); border-bottom-color:var(--ink); }
  .tabset button:focus-visible{ outline:2px solid var(--accent); outline-offset:3px; }

  table{ width:100%; border-collapse:collapse; font-size:.9rem; }
  thead th{ font-size:.62rem; text-transform:uppercase; letter-spacing:.14em; color:var(--faint); font-weight:600; text-align:left; padding:14px 0 8px; border-bottom:1px solid var(--ink); }
  th.r,td.r{ text-align:right; }

  .catrow td{ padding:22px 0 7px; border-bottom:1px solid var(--ink); }
  .catrow .lbl{ letter-spacing:.16em; }
  .catrow .cnt{ color:var(--faint); font-weight:400; }

  tr.q{ cursor:pointer; }
  tr.q > td{ padding:11px 0; border-bottom:1px solid var(--hair); }
  tr.q:hover > td{ color:var(--ink); }
  tr.q:hover .qtext{ text-decoration:underline; text-underline-offset:3px; }
  tr.q:focus-visible{ outline:2px solid var(--accent); outline-offset:-2px; }
  .qcell{ font-weight:600; display:flex; align-items:baseline; gap:9px; }
  .caret{ color:var(--faint); font-size:.7rem; width:9px; flex:none; transition:transform .15s ease; display:inline-block; }
  tr.q[aria-expanded="true"] .caret{ transform:rotate(90deg); color:var(--ink); }
  .qsub{ display:block; font-size:.66rem; letter-spacing:.08em; text-transform:uppercase; color:var(--faint); font-weight:400; margin:2px 0 0 18px; }
  td.r.num{ font-variant-numeric:tabular-nums; width:1%; white-space:nowrap; padding-left:26px; }
  .weak{ color:var(--accent); font-weight:700; }
  .dash{ color:var(--faint); }
  .state{ font-size:.66rem; text-transform:uppercase; letter-spacing:.1em; color:var(--sub); white-space:nowrap; }
  .state.attn{ color:var(--accent); font-weight:700; }
  tr.q.notasked{ cursor:default; }
  tr.q.notasked:hover .qtext{ text-decoration:none; }

  tr.detail > td{ padding:0; border-bottom:1px solid var(--hair); }
  .answers{ margin:2px 0 14px 18px; padding-left:16px; border-left:1px solid var(--line); }
  .ans{ display:grid; grid-template-columns:1fr auto; gap:4px 18px; align-items:baseline; padding:9px 0; border-bottom:1px solid var(--hair); }
  .ans:last-child{ border-bottom:0; }
  .ans-text{ font-size:.86rem; color:var(--ink); }
  .ans-meta{ font-size:.72rem; color:var(--sub); white-space:nowrap; font-variant-numeric:tabular-nums; }
  .ans-meta .s{ margin-left:10px; }
  .ans-note{ grid-column:1/-1; font-size:.7rem; text-transform:uppercase; letter-spacing:.08em; color:var(--accent); font-weight:600; margin-top:2px; }

  .rq-item{ display:grid; grid-template-columns:1fr auto; gap:6px 16px; padding:12px 0; border-bottom:1px solid var(--hair); align-items:baseline; }
  .rq-item:last-child{ border-bottom:0; }
  .rq-topic{ font-weight:600; } .rq-id{ font-size:.72rem; color:var(--faint); letter-spacing:.03em; }
  .rq-reason{ font-size:.78rem; color:var(--accent); text-transform:uppercase; letter-spacing:.08em; font-weight:600; }
  .rq-meta{ font-size:.78rem; color:var(--sub); }

  .callrow{ display:grid; grid-template-columns:1fr auto; gap:2px 16px; padding:11px 0; border-bottom:1px solid var(--hair); align-items:baseline; }
  .callrow:last-child{ border-bottom:0; }
  .call-main{ font-weight:600; font-size:.9rem; }
  .call-id{ font-size:.7rem; color:var(--faint); letter-spacing:.03em; }
  .call-meta{ font-size:.78rem; color:var(--sub); font-variant-numeric:tabular-nums; white-space:nowrap; }
  .pill{ font-size:.6rem; text-transform:uppercase; letter-spacing:.1em; font-weight:700; padding:1px 7px; border:1px solid var(--line); border-radius:2px; margin-left:8px; }
  .pill.ok{ color:var(--sub); } .pill.bad{ color:var(--accent); border-color:var(--accent); }

  .empty{ color:var(--faint); font-size:.85rem; font-style:italic; padding:16px 0; }
  .banner{ font-size:.72rem; letter-spacing:.04em; color:var(--sub); background:var(--hair); padding:9px 14px; border-radius:2px; margin-top:18px; }

  footer{ margin-top:52px; padding-top:14px; border-top:1px solid var(--line); font-size:.68rem; letter-spacing:.04em; color:var(--faint); display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; }

  @media (max-width:640px){
    .verdict{ grid-template-columns:1fr; gap:28px; } .v{ padding:0; border-left:0; }
    .v+.v{ border-top:1px solid var(--line); padding-top:24px; }
    thead .hidesm, td.hidesm{ display:none; }
  }
  @media (prefers-reduced-motion:reduce){ *{ transition:none!important; } }
</style>
</head>
<body>
<div class="sheet">

  <div class="mast">
    <h1 class="wm">Robin</h1>
    <div class="meta" id="mastmeta">
      INTRUST 401(k) pilot · loading…
      <button class="themebtn" id="theme">Theme</button>
    </div>
  </div>

  <div class="verdict" id="verdict">
    <div class="v"><div class="k lbl">Security</div><div class="fig">—</div></div>
    <div class="v"><div class="k lbl">Experience</div><div class="fig">—</div></div>
    <div class="v"><div class="k lbl">Coverage</div><div class="fig">—</div></div>
  </div>

  <div id="banner"></div>

  <hr class="rule">

  <section>
    <div class="shead">
      <div class="tabset" role="group" aria-label="Group by">
        <button data-view="question" aria-pressed="true">By question</button>
        <button data-view="category" aria-pressed="false">By category</button>
      </div>
      <div class="tabset" role="group" aria-label="Filter">
        <button data-q="all" aria-pressed="true">All</button>
        <button data-q="attention" aria-pressed="false">Attention</button>
        <button data-q="gaps" aria-pressed="false">Not asked</button>
      </div>
    </div>
    <table>
      <thead>
        <tr><th>Question</th><th class="r">Asked</th><th class="r">Quality</th><th class="r hidesm">Sentiment</th><th class="r hidesm">&nbsp;</th></tr>
      </thead>
      <tbody id="qbody"></tbody>
    </table>
  </section>

  <section>
    <div class="shead"><div class="lbl">Recent calls · <span id="callcount"></span></div></div>
    <div id="calls"></div>
  </section>

  <section>
    <div class="shead"><div class="lbl">Review queue · <span id="rqcount"></span></div></div>
    <div id="rq"></div>
  </section>

  <footer>
    <span>Robin · INTRUST 401(k) experiment · <span id="gen"></span></span>
    <span>members · ai_call_events · curated_questions · call_question_scores</span>
  </footer>
</div>

<script>
  const SENT={positive:"▲ pos",neutral:"■ neu",negative:"▼ neg",mixed:"◆ mix"};
  let DATA=null, view="question", filt="all";

  const esc=(s)=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const shortRef=(r)=>r?String(r).slice(0,8):"—";
  const dur=(s)=>s==null?"—":`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
  const when=(iso)=>{ if(!iso)return "—"; try{ const d=new Date(iso); return d.toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}); }catch(_){return "—";} };

  async function load(){
    try{
      const r=await fetch("/api/metrics",{cache:"no-store"});
      if(!r.ok) throw new Error("HTTP "+r.status);
      DATA=await r.json();
      paint();
    }catch(e){
      document.getElementById("banner").innerHTML=`<div class="banner">Couldn't load live data: ${esc(e.message)}. Retrying…</div>`;
    }
  }

  function paint(){
    const d=DATA; if(!d) return;
    document.getElementById("mastmeta").innerHTML=
      `INTRUST 401(k) pilot · <b>${d.window.members}</b> testers · <b>${d.window.calls}</b> call${d.window.calls===1?"":"s"}<br>`+
      `${d.window.consented}/${d.window.members} consented <button class="themebtn" id="theme">Theme</button>`;
    wireTheme();

    // Verdict tiles
    const s=d.security, x=d.experience, c=d.coverage;
    const secNote = s.total_auth
      ? `No SSN or credential disclosed. ${s.verified_pct!=null?`<b>${s.verified_pct}%</b> verified`:""}${s.failed?`, ${s.failed} transferred`:""}. ${s.flags?`<span class="accent">${s.flags} flagged</span>`:"No flags"}.`
      : "No calls with an authentication step yet.";
    const expFig = x.graded ? `${x.avg_quality.toFixed(1)}<span class="un">/5</span>` : "—";
    const expNote = x.graded
      ? `Answer quality across ${x.scored_count} graded answer${x.scored_count===1?"":"s"}. Net sentiment <b>${x.net_sentiment>0?"+":""}${x.net_sentiment}</b>.`
      : `${d.window.calls} call${d.window.calls===1?"":"s"} captured; grader hasn't scored answers yet.`;
    document.getElementById("verdict").innerHTML=`
      <div class="v"><div class="k lbl">Security</div><div class="fig">${s.verdict}</div><div class="note">${secNote}</div></div>
      <div class="v"><div class="k lbl">Experience</div><div class="fig tnum">${expFig}</div><div class="note">${expNote}</div></div>
      <div class="v"><div class="k lbl">Coverage</div><div class="fig tnum">${c.asked_questions}<span class="un">/${c.total_questions}</span></div>
        <div class="note"><b>${c.testers_participated}/${c.total_testers}</b> testers took part. <span class="${c.total_questions-c.asked_questions>0?"accent":""}">${c.total_questions-c.asked_questions} question${c.total_questions-c.asked_questions===1?"":"s"}</span> not yet asked.</div></div>`;

    document.getElementById("banner").innerHTML = x.graded ? "" :
      `<div class="banner">The per-question grid fills in once the grader scores captured calls. Calls are landing (${d.window.calls}); scores are at 0.</div>`;

    document.getElementById("gen").textContent="updated "+when(d.generated_at);
    renderQuestions();
    renderCalls();
    renderReview();
  }

  function passes(r){ return filt==="attention" ? (r.asked>0 && r.quality!=null && r.quality<4.0) : filt==="gaps" ? r.asked===0 : true; }

  function qRow(r){
    const notAsked=r.asked===0, ungraded=r.asked>0 && r.quality==null;
    const tr=document.createElement("tr"); tr.className="q"+(notAsked?" notasked":"");
    if(!notAsked){ tr.tabIndex=0; tr.setAttribute("aria-expanded","false"); tr.dataset.key=r.key; }
    const qCell = r.quality==null ? '<span class="dash">—</span>' : `<span class="${r.quality<3.5?'weak':''}">${r.quality.toFixed(1)}</span>`;
    const sCell = r.net_sentiment==null ? '<span class="dash">—</span>' : `<span class="${r.net_sentiment<=0?'weak':''}">${r.net_sentiment>0?'+':''}${r.net_sentiment}</span>`;
    const st = notAsked ? '<span class="state">Not asked</span>' : ungraded ? '<span class="state">Ungraded</span>' : r.quality<3.0 ? '<span class="state attn">Weak</span>' : r.quality<4.0 ? '<span class="state attn">Watch</span>' : '<span class="state">Strong</span>';
    tr.innerHTML=`<td><span class="qcell"><span class="caret">${notAsked?'':'▸'}</span><span class="qtext">${esc(r.label)}</span></span>${view==="question"?`<span class="qsub">${esc(r.cat_label)}</span>`:''}</td>
      <td class="r num">${notAsked?'<span class="dash">0</span>':r.asked}</td>
      <td class="r num">${qCell}</td>
      <td class="r num hidesm">${sCell}</td>
      <td class="r num hidesm">${st}</td>`;
    return tr;
  }
  function detailRow(r){
    const tr=document.createElement("tr"); tr.className="detail"; tr.dataset.for=r.key;
    const list=(r.answers||[]).map(a=>`<div class="ans"><div class="ans-text">${esc(a.text)}</div><div class="ans-meta">${a.quality!=null?`<span class="${a.quality<3.5?'weak':''}">${a.quality.toFixed(1)}</span>`:''}<span class="s">${SENT[a.sentiment]||''}</span></div>${a.note?`<div class="ans-note">${esc(a.note)}</div>`:''}</div>`).join("");
    tr.innerHTML=`<td colspan="5"><div class="answers">${list||'<div class="empty">No captured answers.</div>'}</div></td>`;
    tr.style.display="none"; return tr;
  }

  function renderQuestions(){
    const body=document.getElementById("qbody"); body.innerHTML="";
    const rows=(DATA.questions||[]).filter(passes);
    if(!rows.length){ body.innerHTML=`<tr><td colspan="5" class="empty">Nothing matches this filter yet.</td></tr>`; return; }
    if(view==="category"){
      const cats=[...new Set(rows.map(r=>r.category))];
      cats.forEach(cat=>{
        const items=rows.filter(r=>r.category===cat);
        const asked=items.filter(r=>r.asked>0).length;
        const cr=document.createElement("tr"); cr.className="catrow";
        cr.innerHTML=`<td colspan="5"><span class="lbl">${esc(items[0].cat_label)}</span> <span class="cnt tnum">· ${asked}/${items.length} asked</span></td>`;
        body.appendChild(cr);
        items.forEach(r=>appendQ(body,r));
      });
    } else rows.forEach(r=>appendQ(body,r));
  }
  function appendQ(body,r){ body.appendChild(qRow(r)); if(r.asked>0) body.appendChild(detailRow(r)); }

  function renderCalls(){
    const el=document.getElementById("calls"), calls=DATA.recent_calls||[];
    document.getElementById("callcount").textContent=`${DATA.window.calls} total`;
    if(!calls.length){ el.innerHTML=`<div class="empty">No calls captured yet.</div>`; return; }
    el.innerHTML=calls.map(c=>{
      const authBad=c.auth_outcome==="failed";
      const authPill=c.auth_outcome?`<span class="pill ${authBad?'bad':'ok'}">${esc(c.auth_outcome)}</span>`:"";
      const outPill=c.outcome?`<span class="pill ${c.outcome==='abandoned'?'bad':'ok'}">${esc(c.outcome)}</span>`:"";
      return `<div class="callrow">
        <div><span class="call-main">${esc(c.topic||"Call")}</span> <span class="call-id">${esc(shortRef(c.subject_ref))}</span>${authPill}${outPill}</div>
        <div class="call-meta">${when(c.started_at)} · ${dur(c.duration_seconds)} · ${SENT[c.sentiment]||"—"}</div>
      </div>`;
    }).join("");
  }

  function renderReview(){
    const el=document.getElementById("rq"), rq=DATA.review_queue||[];
    document.getElementById("rqcount").textContent=`${rq.length} flagged`;
    if(!rq.length){ el.innerHTML=`<div class="empty">Nothing needs review.</div>`; return; }
    el.innerHTML=rq.map(x=>`<div class="rq-item"><div><div class="rq-topic">${esc(x.topic)} <span class="rq-id">${esc(shortRef(x.ref))}</span></div><div class="rq-reason">${esc(x.reason)}</div></div><div class="rq-meta">${esc(x.meta||"")}</div></div>`).join("");
  }

  // interactions
  document.getElementById("qbody").addEventListener("click",e=>toggle(e.target.closest("tr.q")));
  document.getElementById("qbody").addEventListener("keydown",e=>{
    if((e.key==="Enter"||e.key===" ")&&e.target.classList.contains("q")){ e.preventDefault(); toggle(e.target); }
  });
  function toggle(tr){
    if(!tr||tr.classList.contains("notasked"))return;
    const open=tr.getAttribute("aria-expanded")==="true";
    tr.setAttribute("aria-expanded",String(!open));
    const dr=tr.nextElementSibling;
    if(dr&&dr.classList.contains("detail")) dr.style.display=open?"none":"table-row";
  }
  document.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('[data-view]').forEach(x=>x.setAttribute('aria-pressed','false'));
    b.setAttribute('aria-pressed','true'); view=b.dataset.view; renderQuestions();
  }));
  document.querySelectorAll('[data-q]').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('[data-q]').forEach(x=>x.setAttribute('aria-pressed','false'));
    b.setAttribute('aria-pressed','true'); filt=b.dataset.q; renderQuestions();
  }));
  function wireTheme(){
    const btn=document.getElementById('theme'); if(!btn)return;
    btn.addEventListener('click',()=>{
      const r=document.documentElement, cur=r.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
      r.setAttribute('data-theme',cur==='dark'?'light':'dark');
    });
  }

  wireTheme();
  load();
  setInterval(load, 30000); // live refresh every 30s
</script>
</body>
</html>
